version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: expense_db_local
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pgdata_local:/var/lib/postgresql/data
    env_file:
      - .env

volumes:
  pgdata_local: