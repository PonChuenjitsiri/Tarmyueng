version: '3.8'

services:
  frontend:
    build: ./frontend
    container_name: expense_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  backend:
    build: ./backend
    container_name: expense_backend
    ports:
      - "8080:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Database=expensetracker;Username=admin;Password=secretpassword
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    container_name: expense_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: expensetracker
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: